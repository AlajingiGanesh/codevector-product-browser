services:
  - type: web
    name: codevector-products-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: CORS_ORIGINS
        sync: false

